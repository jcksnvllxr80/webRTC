# Replace YOUR_ELASTIC_IP with your AWS Elastic IP address
external-ip=YOUR_ELASTIC_IP

listening-port=3478
tls-listening-port=5349

# Replace with your domain or keep as-is for IP-only setup
realm=freertc

# TURN credentials — keep these secret, match what's in config/secrets.json
user=freertc:changeme

lt-cred-mech
fingerprint

# Relay port range — must match the EC2 security group inbound rules
min-port=49152
max-port=65535

# Block relay to private/internal IP ranges (security)
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
