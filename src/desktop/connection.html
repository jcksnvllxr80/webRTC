<!DOCTYPE html>
<html lang="en">
<head>
  <title>Connect to Server</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      padding: 20px;
      max-width: 300px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    input:disabled {
      opacity: 0.6;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background-color: #45a049;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #error-msg {
      margin-top: 10px;
      color: #c0392b;
      font-size: 13px;
      min-height: 18px;
      word-break: break-word;
    }
  </style>
</head>
<body>
<div class="form-group">
  <label for="serverUrl">Server URL:</label>
  <input type="text" id="serverUrl" placeholder="https://your-domain.com:8001">
</div>
<button id="connect-btn" onclick="connect()">Connect</button>
<div id="error-msg"></div>
<script src="connection.js"></script>
</body>
</html>
