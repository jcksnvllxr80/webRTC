<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Choose What to Share</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", sans-serif;
            background: #f3f5f8;
            color: #1a2433;
        }

        body {
            margin: 0;
            padding: 24px;
            background: linear-gradient(180deg, #f8fafc 0%, #eef3f8 100%);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            margin: 0 0 20px;
            color: #526173;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .cancel-btn {
            border: 1px solid #c8d2dd;
            background: white;
            color: #304154;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        .section {
            margin-bottom: 24px;
        }

        .section h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid #d7e0ea;
            border-radius: 16px;
            background: white;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(29, 45, 68, 0.08);
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
            text-align: left;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #82a9d8;
            box-shadow: 0 14px 30px rgba(29, 45, 68, 0.14);
        }

        .thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #dfe7f0;
            display: block;
        }

        .meta {
            padding: 14px;
        }

        .meta-top {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icon {
            width: 20px;
            height: 20px;
            flex: 0 0 auto;
            border-radius: 4px;
        }

        .name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
        }

        .kind {
            margin-top: 6px;
            color: #617286;
            font-size: 13px;
        }

        .empty {
            padding: 18px;
            border: 1px dashed #c8d2dd;
            border-radius: 14px;
            color: #617286;
            background: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <h1>Choose what to share</h1>
    <p>Select a screen or window for screen sharing.</p>
    <div class="actions">
        <button id="cancel-btn" class="cancel-btn" type="button">Cancel</button>
    </div>
    <div id="content"></div>
    <script src="display-picker.js"></script>
</body>
</html>
