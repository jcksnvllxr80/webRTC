<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register — WebRTC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="login-container">
    <h2>Create Account</h2>
    <form id="registerForm">
        <div id="status-message" class="status-message" aria-live="polite"></div>
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" minlength="3" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" minlength="6" required>
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" name="confirm-password" minlength="6" required>
        </div>
        <button type="submit">Register</button>
    </form>
    <p class="form-link">Already have an account? <a href="/login.html">Login</a></p>
</div>
<script src="register.js"></script>
</body>
</html>
